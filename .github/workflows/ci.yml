name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: olist-airflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check formatting (black)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/airflow/dags:/opt/airflow/dags \
            -v ${{ github.workspace }}/tests:/opt/airflow/tests \
            -w /opt/airflow \
            olist-airflow:ci \
            black --check dags/ tests/

      - name: Run tests (pytest)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/airflow/dags:/opt/airflow/dags \
            -v ${{ github.workspace }}/tests:/opt/airflow/tests \
            -v ${{ github.workspace }}/pyproject.toml:/opt/airflow/pyproject.toml \
            -e AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////tmp/airflow_test.db \
            -e AIRFLOW__CORE__EXECUTOR=SequentialExecutor \
            -e AIRFLOW__CORE__LOAD_EXAMPLES=false \
            -w /opt/airflow \
            olist-airflow:ci \
            pytest
