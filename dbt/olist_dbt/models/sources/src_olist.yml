version: 2

sources:
  - name: olist_raw
    database: "{{ target.project }}"
    schema: olist_raw
    config:
      loaded_at_field: ingestion_ts
    freshness:
      warn_after: {count: 25, period: hour}
      error_after: {count: 49, period: hour}

    tables:
      - name: customers
      - name: order_items
      - name: order_payments
      - name: order_reviews
      - name: orders
      - name: products
      - name: sellers
      # Reference tables: static by nature, freshness check not applicable
      - name: geolocation
        freshness: null
      - name: product_category_name_translation
        freshness: null
