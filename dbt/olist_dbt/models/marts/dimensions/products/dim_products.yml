version: 2

models:
  - name: dim_products
    description: Product dimension with surrogate key generated via dbt_utils.generate_surrogate_key.
    columns:
      - name: product_key
        tests: [not_null, unique]
      - name: product_id
        tests: [not_null, unique]
      - name: product_photos_qty
        tests:
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: product_weight_g
        tests:
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: product_length_cm
        tests:
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: product_height_cm
        tests:
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: product_width_cm
        tests:
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
