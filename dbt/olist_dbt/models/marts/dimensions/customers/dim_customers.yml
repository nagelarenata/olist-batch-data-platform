version: 2

models:
  - name: dim_customers
    description: Customer dimension with surrogate key generated via dbt_utils.generate_surrogate_key.
    columns:
      - name: customer_key
        description: Surrogate key generated from customer_id via dbt_utils.generate_surrogate_key.
        tests: [not_null, unique]

      - name: customer_id
        description: Transaction-level customer identifier. A customer may have multiple customer_ids across orders.
        tests: [not_null, unique]

      - name: customer_unique_id
        description: Stable identifier representing the same real customer across multiple orders.
        tests: [not_null]

      - name: customer_zip_code_prefix
        description: 5-digit ZIP code prefix used for geographic analysis.

      - name: customer_city
        description: Customer city (trimmed and lowercased in staging).

      - name: customer_state
        description: Customer state (UF, trimmed and uppercased in staging).

      - name: load_date
        description: Batch partition date from which this record was selected as the latest state.

      - name: ingestion_ts
        description: Ingestion timestamp used as secondary ordering for latest record selection.

      - name: source_file
        description: Source file name from the ingestion batch.

      - name: source_uri
        description: Full GCS URI of the source file from the ingestion batch.