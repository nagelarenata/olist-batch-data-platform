version: 2

models:
  - name: fact_orders
    description: Fact table at order grain (order_id) with lifecycle dates and SLA metrics.
    tests:
      - dbt_utils.unique_combination_of_columns:
          description: "Ensures each order appears only once in the fact table."
          arguments:
            combination_of_columns: [order_id]

    columns:
      - name: order_id
        description: Order identifier (degenerate dimension).
        tests:
          - not_null:
              description: "Ensures every fact row has an order identifier."

      - name: customer_key
        description: Surrogate FK to dim_customers.
        tests:
          - not_null:
              description: "Ensures every order is linked to a customer dimension record."
          - relationships:
              description: "Validates referential integrity between orders and the customer dimension."
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: order_purchase_date_key
        description: Date key (YYYYMMDD) of the order purchase date, FK to dim_date.
        tests:
          - not_null:
              description: "Ensures every order has a purchase date key for time-series analysis."
          - relationships:
              description: "Validates referential integrity between order purchase date and the date dimension."
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: order_approved_date_key
        description: Date key (YYYYMMDD) of the order approval date. Null if not yet approved.
        tests:
          - relationships:
              description: "Validates referential integrity between order approval date and the date dimension when present."
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: order_delivered_customer_date_key
        description: Date key (YYYYMMDD) of the actual delivery date. Null if not yet delivered.
        tests:
          - relationships:
              description: "Validates referential integrity between delivery date and the date dimension when present."
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: order_estimated_delivery_date_key
        description: Date key (YYYYMMDD) of the estimated delivery date.
        tests:
          - relationships:
              description: "Validates referential integrity between estimated delivery date and the date dimension when present."
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: order_status
        description: Current status of the order.
        tests:
          - accepted_values:
              description: "Validates that order status is one of the known lifecycle values."
              arguments:
                values:
                  - created
                  - approved
                  - invoiced
                  - processing
                  - shipped
                  - delivered
                  - canceled
                  - unavailable

      - name: is_delivered
        description: True if the order has a recorded delivery date.
        tests:
          - not_null

      - name: delivery_days
        description: >
          Number of days between order purchase and customer delivery.
          Null when the order has not yet been delivered.
        tests:
          - dbt_utils.accepted_range:
              description: "Validates that delivery days is non-negative when present."
              arguments:
                min_value: 0

      - name: delivery_delay_days
        description: >
          Difference in days between estimated and actual delivery date
          (estimated - delivered). Positive = early, negative = late.
          Null when either date is missing.

      - name: is_delivered_on_time
        description: >
          True if delivered on or before the estimated date.
          Null when either date is missing.