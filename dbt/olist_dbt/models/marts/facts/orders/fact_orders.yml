version: 2

models:
  - name: fact_orders
    description: Fact table at order grain (order_id) with lifecycle dates and SLA metrics.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [order_id]

    columns:
      - name: order_id
        tests: [not_null]

      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: order_purchase_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: order_approved_date_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: order_delivered_customer_date_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: order_estimated_delivery_date_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key