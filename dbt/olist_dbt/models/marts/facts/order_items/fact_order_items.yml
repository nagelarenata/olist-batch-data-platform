version: 2

models:
  - name: fact_order_items
    description: Fact table at order item grain (order_id, order_item_id) with additive measures.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [order_id, order_item_id]

    columns:
      - name: order_id
        tests: [not_null]

      - name: order_item_id
        tests: [not_null]

      - name: product_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_key

      - name: seller_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sellers')
                field: seller_key

      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: order_purchase_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: shipping_limit_date_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: item_qty
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 1

      - name: item_price
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: item_freight
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

