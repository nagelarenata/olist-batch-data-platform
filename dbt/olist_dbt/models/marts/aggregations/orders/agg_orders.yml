version: 2

models:
  - name: agg_orders
    description: Order-level aggregation combining fact_orders (status/SLA) and summed item measures from fact_order_items.

    columns:
      - name: order_id
        tests: [not_null, unique]

      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: order_purchase_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: order_gmv
        tests:
          - dbt_utils.accepted_range:
              arguments: { min_value: 0 }

      - name: order_freight
        tests:
          - dbt_utils.accepted_range:
              arguments: { min_value: 0 }

      - name: order_items_qty
        tests:
          - dbt_utils.accepted_range:
              arguments: { min_value: 0 }