version: 2

models:
  - name: agg_sales_daily
    description: Daily sales KPIs aggregated by order purchase date.

    columns:
      - name: order_purchase_date_key
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: gmv_sum
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0